<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VAPT Security Score Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    margin: 0;
    padding: 10px;
}

.container {
    max-width: 950px;
    margin: auto;
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
}

.logo {
    height: 35px;
}

h1 {
    font-size: 18px;
    margin: 0;
}

/* MAIN LAYOUT */
.main-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

/* SECTIONS */
.section {
    background: #020617;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 8px;
}

h3 {
    font-size: 14px;
    margin: 5px 0 8px;
}

/* INPUT GRID */
.input-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
}

label {
    font-size: 12px;
}

input[type="number"] {
    width: 100%;
    padding: 5px;
    border-radius: 5px;
    border: none;
    font-size: 13px;
}

/* CHECKBOX */
.checkbox {
    font-size: 12px;
    margin-bottom: 4px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    background: #22c55e;
    border: none;
    color: white;
    font-size: 14px;
    border-radius: 6px;
    cursor: pointer;
}

/* RESULTS */
.results {
    background: #020617;
    padding: 12px;
    border-radius: 8px;
}

.score {
    font-size: 30px;
    font-weight: bold;
}

.rating {
    font-size: 16px;
    font-weight: bold;
    margin-top: 5px;
}

/* SCORE COLORS */
.low { color: #22c55e; }
.medium { color: #eab308; }
.high { color: #f97316; }
.critical { color: #ef4444; }

.small-text {
    font-size: 11px;
    color: #94a3b8;
    margin-top: 2px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <img src="kenac-logo.png" alt="Kenac Logo" class="logo">
    <h1>VAPT Security Score</h1>
</div>

<div class="main-layout">

<!-- LEFT SIDE -->
<div>

<div class="section">
<h3>On-Prem</h3>
<div class="input-grid">
<div><label>Critical</label><input id="op_critical" type="number" value="0"></div>
<div><label>High</label><input id="op_high" type="number" value="0"></div>
<div><label>Medium</label><input id="op_medium" type="number" value="0"></div>
<div><label>Low</label><input id="op_low" type="number" value="0"></div>
</div>
</div>

<div class="section">
<h3>Cloud</h3>
<div class="input-grid">
<div><label>Critical</label><input id="cl_critical" type="number" value="0"></div>
<div><label>High</label><input id="cl_high" type="number" value="0"></div>
<div><label>Medium</label><input id="cl_medium" type="number" value="0"></div>
<div><label>Low</label><input id="cl_low" type="number" value="0"></div>
</div>
</div>

<div class="section">
<h3>Risk Adjustments</h3>
<div class="checkbox"><input type="checkbox" id="exploit"> Exploited (-25)</div>
<div class="checkbox"><input type="checkbox" id="rce"> RCE (-20)</div>
<div class="checkbox"><input type="checkbox" id="creds"> Weak Creds (-15)</div>
<div class="checkbox"><input type="checkbox" id="unsupported"> Unsupported (-10)</div>
<div class="checkbox"><input type="checkbox" id="protocols"> Insecure Protocols (-10)</div>
</div>

<button onclick="calculate()">Calculate</button>

</div>

<!-- RIGHT SIDE -->
<div class="results">

<h3>Results</h3>

<div class="score" id="adjustedScore">0</div>
<div class="rating" id="rating">-</div>

<p>Base Score: <span id="baseScore">0</span></p>
<p class="small-text">Score based on vulnerability severity</p>

<p>Adjusted Score: <span id="adjustedScoreText">0</span></p>
<p class="small-text">Adjusted for real-world risk</p>

</div>

</div>

</div>

<script>
function calculate() {

    function getVal(id){ return parseInt(document.getElementById(id).value) || 0; }

    let op = (getVal('op_critical')*10) + (getVal('op_high')*7) + (getVal('op_medium')*4) + (getVal('op_low')*1);
    let cl = (getVal('cl_critical')*10) + (getVal('cl_high')*7) + (getVal('cl_medium')*4) + (getVal('cl_low')*1);

    let totalRisk = op + cl;
    let maxRisk = 2000;

    let baseScore = 100 - (totalRisk / maxRisk * 100);

    let penalty = 0;

    if(document.getElementById('exploit').checked) penalty += 25;
    if(document.getElementById('rce').checked) penalty += 20;
    if(document.getElementById('creds').checked) penalty += 15;
    if(document.getElementById('unsupported').checked) penalty += 10;
    if(document.getElementById('protocols').checked) penalty += 10;

    let adjustedScore = baseScore - penalty;
    if(adjustedScore < 0) adjustedScore = 0;

    function getRating(score){
        if(score >= 80) return {text:"Low Risk", class:"low"};
        if(score >= 60) return {text:"Medium Risk", class:"medium"};
        if(score >= 40) return {text:"High Risk", class:"high"};
        return {text:"Critical", class:"critical"};
    }

    let ratingObj = getRating(adjustedScore);

    document.getElementById('baseScore').innerText = baseScore.toFixed(2);
    document.getElementById('adjustedScoreText').innerText = adjustedScore.toFixed(2);

    let scoreEl = document.getElementById('adjustedScore');
    scoreEl.innerText = adjustedScore.toFixed(0);
    scoreEl.className = "score " + ratingObj.class;

    let ratingEl = document.getElementById('rating');
    ratingEl.innerText = ratingObj.text;
    ratingEl.className = "rating " + ratingObj.class;
}
</script>

</body>
</html>
